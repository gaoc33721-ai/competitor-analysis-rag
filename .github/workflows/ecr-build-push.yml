name: Build & Push to ECR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: competitor-analysis-rag
  IMAGE_CONTEXT: .
  IMAGE_FILE: Dockerfile
  ROLE_TO_ASSUME_RAW: ${{ secrets.AWS_ROLE_TO_ASSUME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AWS_ROLE_TO_ASSUME
        shell: bash
        run: |
          # Do not print the secret value. Only validate presence and format.
          ROLE_TO_ASSUME_RAW_STRIPPED="$(printf '%s' "${ROLE_TO_ASSUME_RAW}" | tr -d '\r\n')"
          ROLE_TO_ASSUME="$(printf '%s' "${ROLE_TO_ASSUME_RAW_STRIPPED}" | xargs)"
          if [ -z "${ROLE_TO_ASSUME}" ]; then
            echo "AWS_ROLE_TO_ASSUME is empty. Please set repository secret AWS_ROLE_TO_ASSUME to a valid IAM Role ARN."
            exit 1
          fi
          python - <<'PY'
          import os, re, sys
          s = os.environ.get("ROLE_TO_ASSUME", "")
          bad = [(i, ord(c)) for i, c in enumerate(s) if (ord(c) > 127) or c.isspace()]
          if bad:
            sample = ", ".join(f"{i}:U+{cp:04X}" for i, cp in bad[:20])
            print("AWS_ROLE_TO_ASSUME contains non-ASCII or whitespace characters:", sample)
            sys.exit(1)
          if not re.match(r"^arn:aws:iam::\d{12}:role\/[\w+=,.@\-\/]+$", s):
            print("AWS_ROLE_TO_ASSUME format invalid. It must look like: arn:aws:iam::123456789012:role/RoleName")
            sys.exit(1)
          print("AWS_ROLE_TO_ASSUME looks valid.")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
            f.write(f"ROLE_TO_ASSUME={s}\n")
          PY
        env:
          ROLE_TO_ASSUME: ${{ env.ROLE_TO_ASSUME_RAW }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.IMAGE_CONTEXT }}
          file: ${{ env.IMAGE_FILE }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
